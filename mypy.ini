[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = False
exclude = [
    '^\.venv/',
    '^venv/',
    '^build/',
    '^dist/',
    '^node_modules/',
    '^packages/frontend/',
]

# 对核心模块启用严格检查
[mypy-packages.core.*]
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-packages.api.*]
disallow_untyped_defs = False
check_untyped_defs = True

# 忽略第三方库（无类型存根）
[mypy-akshare.*]
ignore_missing_imports = True

[mypy-crewai.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-hnswlib.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True
