market_analysis:
  description: >
    对股票 {stock_code}（{company_name}）进行全面的A股市场分析，包括：
    1. 实时行情分析：当前价格、涨跌幅、成交量、技术指标等
    2. 技术形态分析：K线形态、均线系统、支撑阻力位、趋势判断
    3. 资金流向分析：主力资金动向、北向资金、散户资金流向
    4. 板块轮动分析：所属行业板块表现、市场热点分析
    5. 政策面分析：相关行业政策、监管政策影响评估
    重点关注A股市场的特殊性和中国特色的投资环境。

  expected_output: >
    详细的市场分析报告，包括：
    - 实时行情数据和技术指标解读
    - 技术形态和趋势判断
    - 资金流向分析结论
    - 板块轮动和市场热点分析
    - 政策影响评估
    - 短期走势预测和关键关注点
    使用清晰的结构和专业术语，体现A股市场特色。

financial_analysis:
  description: >
    对 {company_name}（{stock_code}）进行深入的财务分析，包括：
    1. 财务比率分析：盈利能力、偿债能力、营运能力、成长能力指标
    2. 财务趋势分析：最近3-5年的财务数据变化趋势
    3. 同业对比分析：与同行业上市公司的关键财务指标对比
    4. 估值分析：PE、PB、PS、PEG等估值指标评估
    5. 财务质量评估：收入质量、利润质量、现金流状况
    6. 风险因素识别：财务风险、经营风险、行业风险等
    重点考虑中国会计准则和A股市场的估值特点。

  expected_output: >
    专业的财务分析报告，包括：
    - 各项财务指标的详细解读和同比环比分析
    - 财务状况的综合评价（优劣势分析）
    - 同业竞争力和行业地位评估
    - 估值水平判断（高估/合理/低估）
    - 财务风险评估和预警
    - 投资价值的财务层面判断
    使用数据支撑分析结论，提供具体的数值对比。

sentiment_analysis:
  description: >
    分析 {company_name}（{stock_code}）的市场情绪状况，包括：
    1. 市场整体情绪：大盘走势、涨跌分布、恐慌贪婪指数
    2. 资金情绪：主力资金流向、北向资金动向、融资融券变化
    3. 新闻舆情：相关新闻、政策消息、市场讨论热度
    4. 投资者情绪：散户情绪、机构观点、分析师评级
    5. 技术情绪：技术指标信号、买卖力道分析
    6. 风险情绪：市场风险偏好、个股风险溢价
    重点分析A股市场的情绪驱动因素和投资者行为特征。

  expected_output: >
    全面市场情绪分析报告，包括：
    - 当前市场情绪状态描述（乐观/悲观/中性）
    - 各类情绪指标的具体分析
    - 情绪驱动因素识别
    - 情绪变化趋势预测
    - 情绪面投资机会和风险提示
    - 基于情绪的交易建议
    体现对A股市场投资者心理的深刻理解。

investment_recommendation:
  description: >
    综合前面的市场分析、财务分析和情绪分析结果，
    为 {company_name}（{stock_code}）提供专业的投资建议：
    1. 投资评级：强烈买入/买入/中性/卖出/强烈卖出
    2. 投资逻辑：综合各方面分析的主要投资理由
    3. 目标价格：6-12个月目标价和预期收益率
    4. 投资策略：建仓策略、持仓策略、止盈止损策略
    5. 风险控制：主要风险识别和应对措施
    6. 时间框架：短期、中期、长期投资建议
    7. 配置建议：在投资组合中的建议配置比例
    考虑A股市场的T+1、涨跌停限制等交易制度特点。

  expected_output: >
    最终投资建议报告，要求：
    - 明确的投资评级和目标价格
    - 详细的投资逻辑分析过程
    - 具体的操作建议和时机选择
    - 完整的风险评估和控制方案
    - 不同时间维度的投资建议
    - 清晰的报告格式和专业表述
    - 为投资者提供可执行的投资决策参考。

# ===== P1新增任务 =====

quant_analysis:
  description: >
    对股票 {stock_code}（{company_name}）进行量化分析，包括：
    1. AI综合评分：技术面、基本面、资金面、情绪面、风险面五维评分
    2. 技术指标分析：MA/EMA/MACD/RSI/KDJ/布林带等指标信号
    3. 形态识别：K线形态（锤子线、十字星、吞没形态等）和图表形态
    4. 板块轮动分析：所属板块强弱、板块资金流向、轮动趋势
    5. 量化信号汇总：综合各指标给出买入/卖出/持有信号
    使用数据驱动的方法，提供客观的量化分析结论。

  expected_output: >
    量化分析报告，包括：
    - AI综合评分（0-100分）及各维度得分明细
    - 技术指标信号汇总表（指标名称、数值、信号）
    - 形态识别结果和交易建议
    - 板块轮动分析和相对强弱评估
    - 量化策略建议（入场点、止损点、目标位）
    - 信号置信度评估

risk_assessment:
  description: >
    对股票 {stock_code}（{company_name}）进行全面风险评估，包括：
    1. 市场风险：大盘系统性风险、板块风险、个股Beta值
    2. 流动性风险：成交量分析、换手率、买卖盘深度
    3. 资金风险：北向资金动向、龙虎榜异动、主力资金流向
    4. 技术风险：超买超卖、支撑阻力位、趋势强度
    5. 基本面风险：财务健康度、估值风险、业绩风险
    6. 政策风险：行业政策、监管风险评估
    综合评估风险等级并提供风险控制建议。

  expected_output: >
    风险评估报告，包括：
    - 综合风险等级（低/中低/中/中高/高）
    - 各类风险的详细评估和量化指标
    - 龙虎榜和北向资金异动分析
    - 风险预警信号和触发条件
    - 风险控制建议（仓位控制、止损设置）
    - 风险收益比评估

# ===== P2新增任务 =====

news_sentiment_analysis:
  description: >
    对股票 {stock_code}（{company_name}）进行新闻情绪分析，包括：
    1. 新闻情绪分析：获取最近7天相关新闻，分析正面/负面/中性情绪分布
    2. 公告情绪分析：分析公司公告内容，识别重大事项
    3. 研报情绪分析：汇总券商研报评级变化，分析机构观点
    4. 事件检测：识别业绩预告、并购重组、增减持、监管处罚等重大事件
    5. 情绪趋势：分析情绪变化趋势，判断情绪拐点
    6. 综合情绪评分：给出-1到1的情绪评分和情绪级别
    运用NLP技术深入分析文本情绪，提供情绪面投资参考。

  expected_output: >
    新闻情绪分析报告，包括：
    - 综合情绪评分（-1到1）和情绪级别（极度看多/偏多/中性/偏空/极度看空）
    - 新闻情绪分析：正面/负面/中性新闻数量和占比
    - 公告情绪分析：重要公告列表和影响评估
    - 研报情绪分析：评级上调/下调/维持统计
    - 关键事件列表：事件类型、影响程度、发生时间
    - 情绪变化趋势和投资建议
    - 风险提示：负面事件预警

limit_up_analysis:
  description: >
    对涨停股票进行专业分析，包括：
    1. 涨停数据获取：获取当日涨停股票列表，统计首板、连板情况
    2. 涨停原因分析：分析涨停原因（概念题材/业绩驱动/并购重组等）
    3. 连板预测：基于封单金额、换手率、开板次数等指标预测连板概率
    4. 热门概念追踪：统计涨停股票所属概念，识别市场热点
    5. 涨停统计：涨停总数、首板数、连板数、最高连板等统计数据
    6. 市场情绪判断：基于涨停数据判断市场情绪强弱
    如果指定了股票代码 {stock_code}，则重点分析该股票的涨停情况。

  expected_output: >
    - 涨停市场概览：涨停总数、首板数、连板数、炸板数
    - 热门概念排行：涨停股票最多的概念板块
    - 连板股票列表：连板天数、涨停原因、封单金额
    - 个股涨停分析（如指定）：涨停原因、连板概率预测、操作建议
    - 市场情绪判断：基于涨停数据的市场情绪评估
    - 风险提示：追高风险、炸板风险等
    - 短线操作建议：关注标的、介入时机、止损设置

# ===== P3新增任务 =====

margin_analysis:
  description: >
    对股票 {stock_code}（{company_name}）进行融资融券分析，包括:
    1. 融资余额分析：融资余额变化趋势、日均净买入
    2. 融券余额分析：融券余额变化、做空力量评估
    3. 两融信号：基于融资融券变化生成看多/看空信号
    4. 市场整体两融：市场融资融券总量和趋势
    5. 两融排名：融资余额最高的股票排名
    6. 信号强度：评估两融信号的可靠性
    融资增加通常表示市场看多，融券增加表示做空力量增强。

  expected_output: >
    融资融券分析报告，包括:
    - 融资余额及变化趋势
    - 融券余额及变化趋势
    - 两融信号（看多/看空/中性）
    - 信号强度评估
    - 与市场整体对比
    - 投资建议

block_trade_analysis:
  description: >
    对股票 {stock_code}（{company_name}）进行大宗交易分析，包括:
    1. 大宗交易记录：获取近期大宗交易数据
    2. 溢价/折价分析：分析成交价与收盘价的关系
    3. 交易信号：基于溢价率生成利好/利空信号
    4. 机构动向：识别机构专用席位的交易
    5. 异常交易检测：检测大额或异常溢价/折价交易
    6. 每日统计：当日大宗交易市场概况
    溢价成交通常表示买方看好，折价成交可能存在减持压力。

  expected_output: >
    大宗交易分析报告，包括:
    - 大宗交易次数和总额
    - 平均溢价/折价率
    - 交易信号判断
    - 机构席位交易情况
    - 异常交易提示
    - 投资建议